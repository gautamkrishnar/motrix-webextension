        run: gh release upload "${{ needs.Version.outputs.version }}" motrix-webextension-${{ matrix.command }}.zip
      - name: Submit to Chrome Web Store
        if: matrix.command == 'chrome'
        run: npx chrome-webstore-upload-cli@3 upload --source motrix-webextension-chrome.zip --auto-publish
        env:
          EXTENSION_ID: ${{ secrets.EXTENSION_ID }}
