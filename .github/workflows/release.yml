jobs:
  Version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 20
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - run: corepack enable
      - name: install
        run: yarn install
      - uses: fregante/daily-version-action@v2
        name: Create tag if necessary
        id: daily-version
